<div id="nap-port-options-container" class="col">
	<label for="nap_detail_id" class="form-label">Puerto de NAP</label>
	<select
		id="nap_detail_id"
		name="nap_detail_id"
		class="form-select"
		{% if not nap_port_options %}disabled{% endif %}
	>
		<option value="" {% if not selected_nap_detail_id %}selected{% endif %}>
			Sin puerto
		</option>
		{% for port in nap_port_options %}
		<option value="{{ port.correlative }}" {% if selected_nap_detail_id and selected_nap_detail_id == port.correlative %}selected{% endif %}>
			{{ port.port_name }}{% if port.in_use and not (selected_nap_detail_id and selected_nap_detail_id == port.correlative) %} (en uso){% endif %}
		</option>
		{% endfor %}
	</select>
	<div class="form-text">Dejar en blanco para guardar sin puerto de NAP.</div>
</div>
